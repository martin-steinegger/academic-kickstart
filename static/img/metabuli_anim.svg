<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 20 202 114" width="202" height="114" role="img" aria-label="Metabuli: metagenomic reads classified down a taxonomy tree into bins">
  <style>
    .read { transform-box:fill-box; transform-origin:center; }
    .r1 { animation: p1 4.8s cubic-bezier(.4,0,.3,1) infinite; }
    .r2 { animation: p2 4.8s cubic-bezier(.4,0,.3,1) infinite; }
    .r3 { animation: p3 4.8s cubic-bezier(.4,0,.3,1) infinite; }
    .bin { transform-box:fill-box; transform-origin:center; animation: lit 4.8s ease-in-out infinite; }
    .hx line { stroke:#fff; stroke-width:1.2; opacity:.75; }
    @keyframes p1 { 0%{transform:translate(0,0);opacity:0;} 8%{opacity:1;} 50%{transform:translate(-58px,86px);opacity:1;} 66%,100%{transform:translate(-58px,86px);opacity:0;} }
    @keyframes p2 { 0%{transform:translate(0,0);opacity:0;} 10%{opacity:1;} 52%{transform:translate(2px,90px);opacity:1;} 68%,100%{transform:translate(2px,90px);opacity:0;} }
    @keyframes p3 { 0%{transform:translate(0,0);opacity:0;} 12%{opacity:1;} 54%{transform:translate(60px,86px);opacity:1;} 70%,100%{transform:translate(60px,86px);opacity:0;} }
    @keyframes lit { 0%,40%{opacity:.35;} 58%,86%{opacity:1;} 100%{opacity:.35;} }
    @media (prefers-reduced-motion: reduce){ .r1,.r2,.r3,.bin{animation:none;} .bin{opacity:1;} .read{opacity:0;} }
  </style>
  <!-- taxonomy tree -->
  <g stroke="#cfcfcf" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M110 34 V52"/><path d="M110 52 L52 96"/><path d="M110 52 L112 96"/><path d="M110 52 L168 96"/>
  </g>
  <!-- sample sequence (helix) at the root -->
  <g class="hx"><rect x="98" y="20" width="24" height="12" rx="6" fill="#6b6b6b"/>
    <line x1="103" y1="30" x2="108" y2="21"/><line x1="108" y1="30" x2="113" y2="21"/><line x1="113" y1="30" x2="118" y2="21"/></g>
  <!-- classified bins (leaves) -->
  <rect class="bin" x="40"  y="100" width="26" height="18" rx="4" fill="#FF3D5C" style="animation-delay:0s"/>
  <rect class="bin" x="99"  y="100" width="26" height="18" rx="4" fill="#7CB342" style="animation-delay:.1s"/>
  <rect class="bin" x="155" y="100" width="26" height="18" rx="4" fill="#26C6DA" style="animation-delay:.2s"/>
  <!-- reads travelling down branches into their bins (two interleaved waves = a stream) -->
  <circle class="read r1" cx="110" cy="40" r="4.5" fill="#FF3D5C" style="animation-delay:0s"/>
  <circle class="read r2" cx="110" cy="40" r="4.5" fill="#7CB342" style="animation-delay:.5s"/>
  <circle class="read r3" cx="110" cy="40" r="4.5" fill="#26C6DA" style="animation-delay:1s"/>
  <circle class="read r1" cx="110" cy="40" r="4.5" fill="#26C6DA" style="animation-delay:2.4s"/>
  <circle class="read r2" cx="110" cy="40" r="4.5" fill="#FF3D5C" style="animation-delay:2.9s"/>
  <circle class="read r3" cx="110" cy="40" r="4.5" fill="#7CB342" style="animation-delay:3.4s"/>
</svg>
