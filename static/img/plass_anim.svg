<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 20 202 114" width="202" height="114" role="img" aria-label="Plass: short peptide reads overlapping and assembling into a folded protein contig">
  <style>
    .read { transform-box:fill-box; transform-origin:center; animation: gather 5s cubic-bezier(.5,0,.2,1) infinite; }
    .contig { transform-box:fill-box; transform-origin:left center; transform:scaleX(0); opacity:0; animation: grow 5s ease-in-out infinite; }
    .hx line { stroke:#fff; stroke-width:1.3; opacity:.75; }
    @keyframes gather {
      0% { transform: translate(var(--sx),var(--sy)); opacity:.35; }
      34% { transform: translate(0,0); opacity:1; }
      70% { transform: translate(0,0); opacity:1; }
      100% { transform: translate(var(--sx),var(--sy)); opacity:.35; }
    }
    @keyframes grow { 0%,38%{transform:scaleX(0);opacity:0;} 60%,84%{transform:scaleX(1);opacity:1;} 100%{transform:scaleX(0);opacity:0;} }
    @media (prefers-reduced-motion: reduce){ .read{animation:none;transform:none;opacity:1;} .contig{animation:none;transform:scaleX(1);opacity:1;} }
  </style>
  <!-- the assembled contig inherits the colours of the reads it was built from -->
  <defs>
    <linearGradient id="plassGrad" gradientUnits="userSpaceOnUse" x1="26" y1="0" x2="192" y2="0">
      <stop offset="0"    stop-color="#FF3D5C"/>
      <stop offset="0.33" stop-color="#FF8B38"/>
      <stop offset="0.66" stop-color="#7CB342"/>
      <stop offset="1"    stop-color="#26C6DA"/>
    </linearGradient>
  </defs>
  <!-- short peptide reads: beads (residues) on a short backbone, sliding into overlap -->
  <g class="read" style="--sx:-18px;--sy:-16px;animation-delay:0s">
    <line x1="26" y1="52" x2="60" y2="52" stroke="#FF3D5C" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="26" cy="52" r="3.6" fill="#FF3D5C"/><circle cx="43" cy="52" r="3.6" fill="#FF3D5C"/><circle cx="60" cy="52" r="3.6" fill="#FF3D5C"/>
  </g>
  <g class="read" style="--sx:14px;--sy:-8px;animation-delay:.1s">
    <line x1="70" y1="66" x2="104" y2="66" stroke="#FF8B38" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="70" cy="66" r="3.6" fill="#FF8B38"/><circle cx="87" cy="66" r="3.6" fill="#FF8B38"/><circle cx="104" cy="66" r="3.6" fill="#FF8B38"/>
  </g>
  <g class="read" style="--sx:20px;--sy:-18px;animation-delay:.2s">
    <line x1="112" y1="52" x2="146" y2="52" stroke="#7CB342" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="112" cy="52" r="3.6" fill="#7CB342"/><circle cx="129" cy="52" r="3.6" fill="#7CB342"/><circle cx="146" cy="52" r="3.6" fill="#7CB342"/>
  </g>
  <g class="read" style="--sx:22px;--sy:12px;animation-delay:.3s">
    <line x1="156" y1="66" x2="190" y2="66" stroke="#26C6DA" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="156" cy="66" r="3.6" fill="#26C6DA"/><circle cx="173" cy="66" r="3.6" fill="#26C6DA"/><circle cx="190" cy="66" r="3.6" fill="#26C6DA"/>
  </g>
  <!-- assembled protein contig with secondary structure -->
  <g class="contig">
    <line x1="26" y1="104" x2="192" y2="104" stroke="url(#plassGrad)" stroke-width="4" stroke-linecap="round"/>
    <g class="hx"><rect x="60" y="98" width="34" height="13" rx="6.5" fill="url(#plassGrad)"/>
      <line x1="65" y1="109" x2="70" y2="99"/><line x1="72" y1="109" x2="77" y2="99"/><line x1="79" y1="109" x2="84" y2="99"/><line x1="86" y1="109" x2="91" y2="99"/></g>
    <path d="M150 104 l14 -8 v4.5 h20 v7 h-20 v4.5 z" fill="url(#plassGrad)"/>
  </g>
</svg>
